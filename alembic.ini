[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Migration files are named `{revision}_{slug}.py`. We use 4-digit numeric revisions.
file_template = %%(rev)s_%%(slug)s

# DB URL is resolved at runtime in env.py from app.core.config.Settings - NOT here.
sqlalchemy.url = driver://placeholder/at-runtime

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
