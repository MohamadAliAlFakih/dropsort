name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest

      - name: Grep gate — no literal "password" under app/
        shell: bash
        run: |
          set -euo pipefail

          MATCHES=$(grep -ri \
            --exclude-dir=__pycache__ \
            --exclude-dir=.mypy_cache \
            --exclude='vault.py' \
            'password' app/ || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden match for 'password' in app/"
            echo "$MATCHES"
            exit 1
          fi

          echo "Grep gate OK."

  frontend:
    name: Frontend (install, typecheck, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build