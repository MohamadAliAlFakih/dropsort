name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff, mypy, pytest, golden)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with Git LFS for classifier weights)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check app tests

      - name: Mypy
        run: uv run mypy app

      - name: Pytest (tests/)
        run: uv run pytest

      - name: Golden replay (classifier eval)
        run: uv run pytest app/classifier/eval/golden.py -v

      - name: Grep gate — no literal "password" under app/
        shell: bash
        run: |
          set -euo pipefail

          MATCHES=$(grep -ri \
            --exclude-dir=__pycache__ \
            --exclude-dir=.mypy_cache \
            --exclude='vault.py' \
            'password' app/ || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden match for 'password' in app/"
            echo "$MATCHES"
            exit 1
          fi

          echo "Grep gate OK."

  docker-api:
    name: Docker build (API image)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Dockerfile
        run: docker build -t dropsort-api:ci -f Dockerfile .

  compose-smoke:
    name: Compose smoke (health → TIFF upload → prediction)
    runs-on: ubuntu-latest
    needs:
      - backend
      - docker-api
    env:
      ADMIN_INITIAL_PASSWORD: ci-smoke-admin-pw
      JWT_SIGNING_KEY: ci-smoke-jwt-signing-key-thirty-two-chars-minimum!!
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare .env
        run: cp .env.example .env

      - name: Run smoke script
        run: bash scripts/ci_smoke.sh

  frontend:
    name: Frontend (install, typecheck, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build
