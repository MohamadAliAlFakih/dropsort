line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "B", "ASYNC", "S"]
# E: pycodestyle errors; F: pyflakes; I: isort; B: bugbear; ASYNC: async safety; S: bandit security
ignore = ["S101"]  # allow `assert` in tests

[lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106"]   # tests may use hardcoded test creds and bare asserts
"alembic/versions/**" = ["E501"]         # auto-generated migrations may exceed line length

[format]
quote-style = "double"
