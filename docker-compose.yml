# dropsort — local laptop stack (Postgres, Redis, Vault, MinIO, SFTP, API, workers, SPA).
# Boot order: infra healthy → vault-seed (KV) → migrate (Alembic) → api / worker / sftp-ingest.
# Frontend waits for API healthcheck so nginx never serves against a down origin during bring-up.

services:

  # ---------- Infra (upstream images, healthchecks) ----------

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      # Compose supplies a known dev password so the DB container becomes healthy.
      # This is not a VAULT-04 violation: the literal lives in compose, not in app/.
      POSTGRES_USER: dropsort
      POSTGRES_PASSWORD: dropsort-dev
      POSTGRES_DB: dropsort
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "dropsort", "-d", "dropsort" ]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 3s
      retries: 15

  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8200/v1/sys/health" ]
      interval: 2s
      timeout: 3s
      retries: 15

  vault-seed:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-dropsort-admin-dev}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
    volumes:
      - ./scripts/vault-seed.sh:/vault-seed.sh:ro
    entrypoint: [ "/bin/sh", "/vault-seed.sh" ]
    restart: "no"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dropsort
      MINIO_ROOT_PASSWORD: dropsort-dev-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live" ]
      interval: 2s
      timeout: 3s
      retries: 15

  sftp:
    image: atmoz/sftp:latest
    restart: unless-stopped
    command: dropsort:dropsort-dev-sftp:1001
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - sftp_incoming:/home/dropsort/incoming
    healthcheck:
      # atmoz/sftp's sh is dash (no /dev/tcp). Use pgrep to confirm sshd is running.
      test: [ "CMD-SHELL", "pgrep sshd > /dev/null" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- App services ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dropsort-backend:dev
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DROPSORT_MODE: api
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: classification
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dropsort
      MINIO_SECRET_KEY: dropsort-dev-minio
      MINIO_BUCKET: documents
      PIPELINE_MAX_FILE_SIZE_MB: 25
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import http.client,json,sys; c=http.client.HTTPConnection('127.0.0.1',8000,timeout=5); c.request('GET','/health'); r=c.getresponse(); b=r.read().decode(); d=json.loads(b) if b else {}; sys.exit(0 if r.status==200 and d.get('ok') else 1)",
        ]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 90s

  worker:
    image: dropsort-backend:dev
    command: python -m app.workers.inference_worker
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DROPSORT_MODE: worker
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: classification
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dropsort
      MINIO_SECRET_KEY: dropsort-dev-minio
      MINIO_BUCKET: documents

  sftp-ingest:
    image: dropsort-backend:dev
    command: python -m app.workers.sftp_ingest
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      sftp:
        condition: service_healthy
      vault:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DROPSORT_MODE: sftp-ingest
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: classification
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dropsort
      MINIO_SECRET_KEY: dropsort-dev-minio
      MINIO_BUCKET: documents
      SFTP_HOST: sftp
      SFTP_PORT_INTERNAL: 22
      SFTP_USERNAME: dropsort
      SFTP_SECRET: dropsort-dev-sftp
      SFTP_WATCH_DIR: /incoming
      SFTP_POLL_INTERVAL_SECONDS: 5
      PIPELINE_MAX_FILE_SIZE_MB: 25

  migrate:
    image: dropsort-backend:dev
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
    environment:
      DROPSORT_MODE: migrate
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
    restart: "no"

  # ---------- Frontend (static SPA; nginx listens on container port 80) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    image: dropsort-frontend:dev
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sftp_incoming:
