# dropsort - local laptop stack.
# Phase 1: db/redis/vault/minio/sftp come up healthy. api/worker/sftp-ingest/migrate
# are build-only stubs (no command:) until Phase 5 fills them in.

services:

  # ---------- Infra (upstream images, healthchecks) ----------

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      # Phase 5 swaps this to Vault-sourced. Phase 1 hardcodes a known dev value
      # so the container becomes healthy; this is NOT a violation of VAULT-04 because
      # it lives in compose, not in app/.
      POSTGRES_USER: dropsort
      POSTGRES_PASSWORD: dropsort-dev
      POSTGRES_DB: dropsort
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "dropsort", "-d", "dropsort" ]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 3s
      retries: 15

  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dropsort-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8200/v1/sys/health" ]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dropsort
      MINIO_ROOT_PASSWORD: dropsort-dev-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live" ]
      interval: 2s
      timeout: 3s
      retries: 15

  sftp:
    image: atmoz/sftp:latest
    restart: unless-stopped
    command: dropsort:dropsort-dev-sftp:1001
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - sftp_incoming:/home/dropsort/incoming
    healthcheck:
      # atmoz/sftp's sh is dash (no /dev/tcp). Use pgrep to confirm sshd is running.
      test: [ "CMD-SHELL", "pgrep sshd > /dev/null" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- App services (BUILD-ONLY STUBS per CONTEXT D-17) ----------
  # Phase 5 (Shari, INFRA) adds `command:` directives and `depends_on:` graph.

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dropsort-backend:dev
    environment:
      DROPSORT_MODE: api
    ports:
      - "${API_PORT:-8000}:8000"

  worker:
    image: dropsort-backend:dev
    command: python -m app.workers.inference_worker
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      DROPSORT_MODE: worker
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: classification
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dropsort
      MINIO_SECRET_KEY: dropsort-dev-minio
      MINIO_BUCKET: documents

  sftp-ingest:
    image: dropsort-backend:dev
    command: python -m app.workers.sftp_ingest
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      sftp:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      DROPSORT_MODE: sftp-ingest
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: classification
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dropsort
      MINIO_SECRET_KEY: dropsort-dev-minio
      MINIO_BUCKET: documents
      SFTP_HOST: sftp
      SFTP_PORT_INTERNAL: 22
      SFTP_USERNAME: dropsort
      SFTP_SECRET: dropsort-dev-sftp
      SFTP_WATCH_DIR: /incoming
      SFTP_POLL_INTERVAL_SECONDS: 5
      PIPELINE_MAX_FILE_SIZE_MB: 25

  migrate:
    image: dropsort-backend:dev
    environment:
      DROPSORT_MODE: migrate

  # ---------- Frontend (static SPA; nginx listens on container port 80) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: dropsort-frontend:dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sftp_incoming:
