[mypy]
python_version = 3.11
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = True
no_implicit_optional = True
strict_equality = True

# Non-strict per CONTEXT D-05 — defer full strictness to a later milestone
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-rq.*]
ignore_missing_imports = True

[mypy-casbin.*]
ignore_missing_imports = True

[mypy-casbin_sqlalchemy_adapter.*]
ignore_missing_imports = True

[mypy-fastapi_cache.*]
ignore_missing_imports = True

[mypy-hvac.*]
ignore_missing_imports = True

[mypy-minio.*]
ignore_missing_imports = True

[mypy-paramiko.*]
ignore_missing_imports = True

[mypy-fastapi_users.*]
ignore_missing_imports = True
